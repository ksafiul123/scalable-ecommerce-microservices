server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**

            # ✅ product-service and categories are SEPARATE routes
            # Two Path predicates on one route = AND (never matches) — split them
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**

            - id: category-service
              uri: lb://product-service
              predicates:
                - Path=/api/categories/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
